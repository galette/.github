name: 'Build Galette'
description: 'Build Galette core with optimized caching'
author: 'Galette Team'

inputs:
  php-version:
    description: 'PHP version to use for cache keys'
    required: true
  skip-checkout:
    description: 'Skip Galette checkout (set to true when Galette repo is already checked out at workspace root)'
    required: false
    default: 'false'
  galette-ref:
    description: 'Galette core branch/tag to checkout (ignored when skip-checkout is true)'
    required: false
    default: 'develop'
  enable-assets-cache:
    description: 'Enable semantic hash cache for built assets'
    required: false
    default: 'true'

outputs:
  galette-path:
    description: 'Path to Galette root directory'
    value: ${{ steps.set-paths.outputs.galette-path }}

runs:
  using: "composite"
  steps:
    - name: Set paths
      id: set-paths
      shell: bash
      env:
        SKIP_CHECKOUT: ${{ inputs.skip-checkout }}
        GALETTE_REF: ${{ inputs.galette-ref }}
      run: |
        if [ "$SKIP_CHECKOUT" = "true" ]; then
          echo "galette-path=." >> $GITHUB_OUTPUT
          echo "composer-file=composer.json" >> $GITHUB_OUTPUT
        else
          echo "galette-path=galette-core" >> $GITHUB_OUTPUT
          echo "composer-file=galette-core/composer.json" >> $GITHUB_OUTPUT
        fi
        echo "galette-ref=$GALETTE_REF" >> $GITHUB_OUTPUT

    - name: Checkout Galette core
      if: inputs.skip-checkout != 'true'
      uses: actions/checkout@v6
      with:
        repository: galette/galette
        path: galette-core
        fetch-depth: 1
        ref: ${{ steps.set-paths.outputs.galette-ref }}

    - name: Show versions
      shell: bash
      run: |
        php --version
        composer --version
        echo "node $(node --version)"
        echo "npm $(npm --version)"

    - name: Get Composer cache directory
      shell: bash
      id: composer-cache
      env:
        COMPOSER_FILE: ${{ steps.set-paths.outputs.composer-file }}
      run: |
        echo "dir=$(composer config -f "$COMPOSER_FILE" cache-files-dir)" >> $GITHUB_OUTPUT

    - name: Cache Composer dependencies
      uses: actions/cache@v5
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: "${{ runner.os }}-composer-${{ inputs.php-version }}-${{ hashFiles('**/composer.lock') }}"
        restore-keys: |
          ${{ runner.os }}-composer-${{ inputs.php-version }}-
          ${{ runner.os }}-composer-

    - name: Cache npm dependencies
      uses: actions/cache@v5
      with:
        path: ~/.npm
        key: "${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}"
        restore-keys: |
          ${{ runner.os }}-npm-

    - name: Semantic hash (assets)
      id: semantic-hash
      if: inputs.enable-assets-cache == 'true'
      shell: bash
      working-directory: ${{ steps.set-paths.outputs.galette-path }}
      run: |
        echo "semantichash=$(tar cf - --sort=name ./ui --mtime='UTC 2025-01-01' | sha1sum | cut -d' ' -f1)" >> $GITHUB_OUTPUT

    - name: Cache Galette built assets
      id: cache-assets
      if: inputs.enable-assets-cache == 'true'
      uses: actions/cache@v5
      with:
        path: |
          ${{ steps.set-paths.outputs.galette-path }}/galette/webroot/themes/
          ${{ steps.set-paths.outputs.galette-path }}/galette/webroot/assets/
        key: "${{ runner.os }}-galette-${{ steps.semantic-hash.outputs.semantichash }}"

    - name: Install Galette dependencies
      shell: bash
      working-directory: ${{ steps.set-paths.outputs.galette-path }}
      env:
        ASSETS_CACHE_RESTORED: ${{ steps.cache-assets.outputs.cache-hit }}
      run: bin/install_deps
